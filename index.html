<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生鲜剩菜交易平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #F5F3FF 0%, #EDE9FE 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(124, 58, 237, 0.1);
            padding: 40px;
        }
        .title {
            text-align: center;
            color: #5B21B6;
            margin-bottom: 40px;
            font-size: 32px;
            font-weight: 800;
        }
        .page {
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }
        .page.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .role-home {
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: center;
            min-height: 300px;
            flex-wrap: wrap;
        }
        .role-btn {
            width: 220px;
            height: 140px;
            border: none;
            border-radius: 20px;
            font-size: 22px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.2);
        }
        .btn-buyer {
            background: linear-gradient(135deg, #A78BFA 0%, #7C3AED 100%);
        }
        .btn-seller {
            background: linear-gradient(135deg, #8B5CF6 0%, #6D28D9 100%);
        }
        .role-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(124, 58, 237, 0.35);
        }
        .back-btn {
            padding: 10px 20px;
            background: #6B7280;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 25px;
            transition: 0.3s;
        }
        .back-btn:hover {
            background: #4B5563;
        }
        .auth-form, .form-card {
            max-width: 480px;
            margin: 0 auto;
            padding: 35px;
            background: #FAF5FF;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.08);
        }
        .input-group {
            margin-bottom: 24px;
        }
        .input-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #4F46E5;
            font-size: 15px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #E5E7EB;
            border-radius: 12px;
            font-size: 16px;
            transition: 0.3s;
            outline: none;
        }
        .input-group input:focus {
            border-color: #7C3AED;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #7C3AED 0%, #8B5CF6 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.2);
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.3);
        }
        .goods-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
            margin-top: 25px;
        }
        .goods-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.08);
            transition: all 0.3s ease;
        }
        .goods-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(124, 58, 237, 0.15);
        }
        .goods-card h3 {
            color: #1F2937;
            margin-bottom: 12px;
            font-size: 20px;
            font-weight: 700;
        }
        .price {
            color: #DC2626;
            font-size: 24px;
            font-weight: 800;
            margin: 15px 0;
        }
        .stock {
            color: #6B7280;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .sold-out {
            color: #EF4444;
            font-weight: 700;
            font-size: 14px;
            margin: 10px 0;
        }
        .cart-btn, .edit-btn, .del-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            margin-top: 8px;
            transition: 0.3s;
        }
        .cart-btn {
            background: linear-gradient(135deg, #A78BFA 0%, #7C3AED 100%);
        }
        .edit-btn {
            background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);
        }
        .del-btn {
            background: linear-gradient(135deg, #EF4444 0%, #DC2626 100%);
        }
        .cart-item, .order-item {
            padding: 20px;
            background: #FAF5FF;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 4px solid #7C3AED;
        }
        .cart-item h4, .order-item p:first-child {
            color: #5B21B6;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .order-item p:last-child {
            color: #6B7280;
            font-size: 13px;
        }
        .pay-btn {
            padding: 18px 40px;
            background: linear-gradient(135deg, #7C3AED 0%, #6D28D9 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.25);
            margin-top: 25px;
        }
        .pay-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.35);
        }
        .tip {
            color: #9CA3AF;
            margin: 15px 0;
            text-align: center;
            font-size: 13px;
        }
        h2 {
            color: #5B21B6;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: 700;
        }
        h3 {
            color: #4F46E5;
            margin: 30px 0 15px;
            font-size: 20px;
            font-weight: 700;
        }
        .stats {
            background: #FAF5FF;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            font-size: 16px;
            color: #5B21B6;
            font-weight: 600;
        }
        .pay-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
        }
        .qr-code {
            width: 220px;
            height: 220px;
            margin: 20px auto;
            border-radius: 12px;
        }
        .confirm-pay-btn {
            background: #10B981;
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
        }
        .auth-switch {
            text-align: center;
            margin-top: 20px;
            color: #6B7280;
        }
        .auth-switch a {
            color: #7C3AED;
            cursor: pointer;
            font-weight: 600;
        }
        .auth-switch a:hover {
            text-decoration: underline;
        }
        .upload-qr {
            margin: 15px 0;
            padding: 10px;
            border: 2px dashed #A78BFA;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .upload-qr:hover {
            background: #FAF5FF;
            border-color: #7C3AED;
        }
        .seller-qr-preview {
            width: 120px;
            height: 120px;
            margin: 10px auto;
            border-radius: 8px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="title">生鲜剩菜交易平台</h1>

    <!-- 首页角色选择 -->
    <div id="homePage" class="page active">
        <div class="role-home">
            <button class="role-btn btn-buyer" onclick="goBuyer()">我是买家</button>
            <button class="role-btn btn-seller" onclick="goSellerLogin()">我是卖家</button>
        </div>
    </div>

    <!-- 卖家登录 -->
    <div id="sellerLoginPage" class="page">
        <button class="back-btn" onclick="goHome()">返回首页</button>
        <div class="auth-form">
            <h2 style="text-align:center; margin-bottom:25px;">卖家登录</h2>
            <div class="input-group">
                <label>用户名</label>
                <input id="loginUsername" placeholder="输入您的用户名">
            </div>
            <div class="input-group">
                <label>密码</label>
                <input id="loginPassword" type="password" placeholder="输入您的密码">
            </div>
            <button class="submit-btn" onclick="sellerLogin()">登录</button>
            <div class="auth-switch">
                还没有账号？ <a onclick="goSellerRegister()">立即注册</a>
            </div>
        </div>
    </div>

    <!-- 卖家注册 -->
    <div id="sellerRegisterPage" class="page">
        <button class="back-btn" onclick="goHome()">返回首页</button>
        <div class="auth-form">
            <h2 style="text-align:center; margin-bottom:25px;">卖家注册</h2>
            <div class="input-group">
                <label>用户名</label>
                <input id="regUsername" placeholder="设置您的用户名">
            </div>
            <div class="input-group">
                <label>密码</label>
                <input id="regPassword" type="password" placeholder="设置您的密码">
            </div>
            <div class="input-group">
                <label>确认密码</label>
                <input id="regPasswordConfirm" type="password" placeholder="再次输入密码">
            </div>
            <div class="upload-qr" onclick="document.getElementById('qrUpload').click()">
                <p>点击上传您的微信收款码</p>
                <input type="file" id="qrUpload" accept="image/*" style="display:none" onchange="previewQrCode(event)">
            </div>
            <img id="regQrPreview" class="seller-qr-preview" alt="收款码预览">
            <button class="submit-btn" onclick="sellerRegister()">注册账号</button>
            <div class="auth-switch">
                已有账号？ <a onclick="goSellerLogin()">立即登录</a>
            </div>
        </div>
    </div>

    <!-- 卖家中心 -->
    <div id="sellerCenterPage" class="page">
        <button class="back-btn" onclick="goHome()">返回首页</button>
        <h2>卖家中心｜<span id="currentSeller" style="color:#7C3AED;"></span></h2>
        <div class="stats">
            总销量：<span id="totalSales" style="color:#DC2626; font-size:18px;">0</span> 件
        </div>
        
        <!-- 发布商品 -->
        <div class="form-card">
            <h3>发布 / 修改商品</h3>
            <div class="input-group">
                <label>商品名称</label>
                <input id="goodsName" placeholder="例如：精品剩菜套餐">
            </div>
            <div class="input-group">
                <label>商品价格（元）</label>
                <input id="goodsPrice" type="number" step="0.01" placeholder="0.00">
            </div>
            <div class="input-group">
                <label>库存数量</label>
                <input id="goodsStock" type="number" placeholder="0">
            </div>
            <button class="submit-btn" onclick="publishGoods()">发布商品</button>
        </div>

        <h3>我的商品</h3>
        <div class="goods-grid" id="sellerGoodsList"></div>

        <h3>我的订单</h3>
        <div id="sellerOrderList"></div>
    </div>

    <!-- 买家商城 -->
    <div id="buyerMarketPage" class="page">
        <button class="back-btn" onclick="goHome()">返回首页</button>
        <h2>全局商城</h2>
        <button class="cart-btn" onclick="goCart()" style="margin:15px 0; width:auto;">🛒 我的购物车</button>
        <div class="goods-grid" id="buyerGoodsList"></div>
    </div>

    <!-- 购物车 -->
    <div id="cartPage" class="page">
        <button class="back-btn" onclick="goBuyerMarket()">返回商城</button>
        <h2>购物车</h2>
        <div id="cartList"></div>
        <div style="margin-top:30px;">
            <h3>合计金额：<span id="totalMoney" style="color:#DC2626; font-size:26px;">0</span> 元</h3>
            <button class="pay-btn" onclick="showPayQr()">扫码支付</button>
            <p class="tip">扫码完成支付后，点击下方确认按钮</p>
        </div>
    </div>

    <!-- 扫码支付弹窗 -->
    <div class="pay-modal" id="payModal">
        <div class="modal-content">
            <h2>微信扫码付款给：<span id="payToSeller"></span></h2>
            <p>支付完成后点击「已支付」</p>
            <img class="qr-code" id="payQrCode" src="" alt="收款二维码">
            <button class="confirm-pay-btn" onclick="finishPay()">已完成支付</button>
        </div>
    </div>
</div>

<script>
// 全局数据存储（同一设备下所有用户共享）
let allGoods = JSON.parse(localStorage.getItem('GLOBAL_GOODS')) || [];
let allOrders = JSON.parse(localStorage.getItem('GLOBAL_ORDERS')) || [];
let allSellers = JSON.parse(localStorage.getItem('ALL_SELLERS')) || []; // 卖家账号数据库
let currentSeller = null; // 当前登录卖家对象
let cart = [];
let editGoodsIndex = null;
let selectedSellerForPay = null; // 当前支付对应的卖家

// 页面切换
function hideAllPages() {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
}
function goHome() {
    hideAllPages();
    document.getElementById('homePage').classList.add('active');
    currentSeller = null; // 退出登录
}
function goBuyer() {
    hideAllPages();
    document.getElementById('buyerMarketPage').classList.add('active');
    renderBuyerGoods(); // 每次进入都重新渲染，确保删除实时生效
}
function goSellerLogin() {
    hideAllPages();
    document.getElementById('sellerLoginPage').classList.add('active');
}
function goSellerRegister() {
    hideAllPages();
    document.getElementById('sellerRegisterPage').classList.add('active');
}
function goSellerCenter() {
    hideAllPages();
    document.getElementById('sellerCenterPage').classList.add('active');
    document.getElementById('currentSeller').innerText = currentSeller.username;
    renderSellerData();
}
function goCart() {
    hideAllPages();
    document.getElementById('cartPage').classList.add('active');
    renderCart();
}
function goBuyerMarket() {
    hideAllPages();
    document.getElementById('buyerMarketPage').classList.add('active');
    renderBuyerGoods(); // 实时渲染最新商品列表
}

// 卖家注册
function sellerRegister() {
    const username = document.getElementById('regUsername').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirmPwd = document.getElementById('regPasswordConfirm').value;
    const qrFile = document.getElementById('qrUpload').files[0];
    
    // 验证
    if (!username || !password || !confirmPwd) {
        alert('请填写完整信息');
        return;
    }
    if (password !== confirmPwd) {
        alert('两次密码不一致');
        return;
    }
    if (!qrFile) {
        alert('请上传微信收款码');
        return;
    }
    if (allSellers.some(s => s.username === username)) {
        alert('用户名已存在');
        return;
    }
    
    // 读取收款码图片
    const reader = new FileReader();
    reader.onload = function(e) {
        // 创建卖家账号
        const newSeller = {
            username,
            password,
            qrCode: e.target.result, // 收款码base64
            sales: 0
        };
        allSellers.push(newSeller);
        saveGlobalData();
        
        alert('注册成功！请登录');
        goSellerLogin();
        document.getElementById('qrUpload').value = '';
        document.getElementById('regQrPreview').style.display = 'none';
    };
    reader.readAsDataURL(qrFile);
}

// 卖家登录
function sellerLogin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    
    const seller = allSellers.find(s => s.username === username && s.password === password);
    if (!seller) {
        alert('用户名或密码错误');
        return;
    }
    
    currentSeller = seller;
    goSellerCenter();
}

// 收款码预览
function previewQrCode(event) {
    const file = event.target.files[0];
    if (file) {
        const reader = new FileReader();
        const preview = document.getElementById('regQrPreview');
        reader.onload = function(e) {
            preview.src = e.target.result;
            preview.style.display = 'block';
        };
        reader.readAsDataURL(file);
    }
}

// 发布/修改商品
function publishGoods() {
    if (!currentSeller) {
        alert('请先登录');
        return;
    }
    
    const name = document.getElementById('goodsName').value.trim();
    const price = parseFloat(document.getElementById('goodsPrice').value) || 0;
    const stock = parseInt(document.getElementById('goodsStock').value) || 0;
    
    if (!name || price <= 0 || stock < 0) {
        alert('请填写完整有效信息');
        return;
    }

    const goods = { 
        sellerId: currentSeller.username, // 用用户名作为卖家ID
        sellerName: currentSeller.username,
        name, 
        price, 
        stock, 
        sales: 0 
    };
    
    editGoodsIndex !== null ? 
        (allGoods[editGoodsIndex] = goods, editGoodsIndex = null) : 
        allGoods.push(goods);
    
    saveGlobalData();
    clearGoodsForm();
    renderSellerData();
    renderBuyerGoods(); // 实时更新买家端商品列表
}

// 编辑商品
function editGoods(index) {
    const g = allGoods[index];
    if (g.sellerId !== currentSeller.username) {
        alert('您只能编辑自己的商品');
        return;
    }
    
    document.getElementById('goodsName').value = g.name;
    document.getElementById('goodsPrice').value = g.price;
    document.getElementById('goodsStock').value = g.stock;
    editGoodsIndex = index;
}

// 删除商品（卖家专属，删除后买家立即看不见）
function deleteGoods(index) {
    const g = allGoods[index];
    if (g.sellerId !== currentSeller.username) {
        alert('您只能删除自己的商品');
        return;
    }
    
    if(confirm('确定要删除该商品吗？删除后买家将立即无法看到！')) {
        allGoods.splice(index, 1); // 从数组中移除
        saveGlobalData();
        renderSellerData();
        renderBuyerGoods(); // 实时更新买家端，立即看不见该商品
    }
}

// 买家加入购物车
function addToCart(index) {
    const goods = allGoods[index];
    if (goods.stock <= 0) {
        alert('商品已售罄');
        return;
    }
    
    // 购物车中同一卖家商品合并（简单版）
    const existingItemIndex = cart.findIndex(item => item.sellerId === goods.sellerId);
    if (existingItemIndex >= 0) {
        cart[existingItemIndex].buyNum += 1;
    } else {
        cart.push({ ...goods, buyNum: 1, goodsIndex: index });
    }
    
    // 记录支付对应的卖家（这里简化为购物车中第一个卖家，实际项目需支持多卖家支付）
    selectedSellerForPay = allSellers.find(s => s.username === goods.sellerId);
    
    alert('加入购物车成功！');
    renderCart();
}

// 渲染购物车
function renderCart() {
    const el = document.getElementById('cartList');
    let total = 0;
    el.innerHTML = '';
    
    cart.forEach(item => {
        total += item.price * item.buyNum;
        el.innerHTML += `
            <div class="cart-item">
                <h4>${item.name}</h4>
                <p>单价：${item.price.toFixed(2)}元 | 数量：${item.buyNum}</p>
                <p>卖家：${item.sellerName}</p>
            </div>
        `;
    });
    
    document.getElementById('totalMoney').innerText = total.toFixed(2);
}

// 显示支付二维码（对应卖家的收款码）
function showPayQr() {
    if (cart.length === 0) {
        alert('购物车为空');
        return;
    }
    if (!selectedSellerForPay) {
        alert('未找到对应的卖家信息');
        return;
    }
    
    document.getElementById('payToSeller').innerText = selectedSellerForPay.username;
    document.getElementById('payQrCode').src = selectedSellerForPay.qrCode;
    document.getElementById('payModal').style.display = 'flex';
}

// 完成支付（同步订单+库存）
function finishPay() {
    cart.forEach(item => {
        const goods = allGoods[item.goodsIndex];
        goods.stock -= item.buyNum;
        goods.sales += item.buyNum;
        
        // 更新卖家销量统计
        const seller = allSellers.find(s => s.username === goods.sellerId);
        if (seller) seller.sales += item.buyNum;
        
        allOrders.push({
            seller: goods.sellerName,
            goodsName: goods.name,
            buyNum: item.buyNum,
            money: (item.price * item.buyNum).toFixed(2),
            time: new Date().toLocaleString()
        });
    });
    
    saveGlobalData();
    cart = [];
    document.getElementById('payModal').style.display = 'none';
    alert('支付成功！订单已同步');
    goBuyer();
}

// 数据保存（自动同步所有数据）
function saveGlobalData() {
    localStorage.setItem('GLOBAL_GOODS', JSON.stringify(allGoods));
    localStorage.setItem('GLOBAL_ORDERS', JSON.stringify(allOrders));
    localStorage.setItem('ALL_SELLERS', JSON.stringify(allSellers));
}

// 渲染买家商品列表（每次调用都重新渲染，确保删除实时生效）
function renderBuyerGoods() {
    const el = document.getElementById('buyerGoodsList');
    el.innerHTML = '';
    
    // 过滤掉已删除的商品（这里allGoods数组已实时更新）
    allGoods.forEach((g, i) => {
        el.innerHTML += `
            <div class="goods-card">
                <h3>${g.name}</h3>
                <p>卖家：${g.sellerName}</p>
                <div class="price">¥${g.price.toFixed(2)}</div>
                <div class="stock">库存：${g.stock}</div>
                ${g.stock <= 0 ? '<p class="sold-out">❌ 已售罄</p>' : ''}
                <button class="cart-btn" onclick="addToCart(${i})" ${g.stock <= 0 ? 'disabled' : ''}>
                    ${g.stock <= 0 ? '❌ 已售罄' : '🛒 加入购物车'}
                </button>
            </div>
        `;
    });
}

// 渲染卖家数据
function renderSellerData() {
    renderSellerGoods();
    renderSellerOrders();
    calcTotalSales();
}

function renderSellerGoods() {
    const el = document.getElementById('sellerGoodsList');
    el.innerHTML = '';
    
    allGoods.forEach((g, i) => {
        if (g.sellerId === currentSeller.username) {
            el.innerHTML += `
                <div class="goods-card">
                    <h3>${g.name}</h3>
                    <div class="price">¥${g.price.toFixed(2)}</div>
                    <div class="stock">库存：${g.stock}｜销量：${g.sales}</div>
                    ${g.stock <= 0 ? '<p class="sold-out">❌ 已售罄</p>' : ''}
                    <button class="edit-btn" onclick="editGoods(${i})">修改商品</button>
                    <button class="del-btn" onclick="deleteGoods(${i})">删除商品</button>
                </div>
            `;
        }
    });
}

function renderSellerOrders() {
    const el = document.getElementById('sellerOrderList');
    el.innerHTML = '';
    
    allOrders.forEach(o => {
        if (o.seller === currentSeller.username) {
            el.innerHTML += `
                <div class="order-item">
                    <p>商品：${o.goodsName}｜数量：${o.buyNum}｜金额：${o.money}元</p>
                    <p>下单时间：${o.time}</p>
                </div>
            `;
        }
    });
}

function calcTotalSales() {
    let total = 0;
    allGoods.forEach(g => {
        if (g.sellerId === currentSeller.username) total += g.sales;
    });
    document.getElementById('totalSales').innerText = total;
}

// 辅助函数
function clearGoodsForm() {
    document.getElementById('goodsName').value = '';
    document.getElementById('goodsPrice').value = '';
    document.getElementById('goodsStock').value = '';
}

// 初始化：每次页面加载都确保渲染最新数据
document.addEventListener('DOMContentLoaded', function() {
    if (document.getElementById('buyerMarketPage').classList.contains('active')) {
        renderBuyerGoods();
    }
});
</script>
</body>
</html>

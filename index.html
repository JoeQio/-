
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轻奢生鲜交易平台</title>
    <style>
        /* 全局重置 + 高级字体 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #F5F3FF 0%, #EDE9FE 100%);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        /* 主容器 */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(124, 58, 237, 0.1);
            padding: 40px;
            overflow: hidden;
        }

        /* 标题样式 */
        .title {
            text-align: center;
            color: #5B21B6;
            margin-bottom: 40px;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        /* 页面切换 */
        .page {
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }
        .page.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 首页角色按钮 */
        .role-home {
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: center;
            min-height: 300px;
            flex-wrap: wrap;
        }
        .role-btn {
            width: 220px;
            height: 140px;
            border: none;
            border-radius: 20px;
            font-size: 22px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.2);
        }
        .btn-buyer {
            background: linear-gradient(135deg, #A78BFA 0%, #7C3AED 100%);
        }
        .btn-seller {
            background: linear-gradient(135deg, #8B5CF6 0%, #6D28D9 100%);
        }
        .role-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(124, 58, 237, 0.35);
        }

        /* 返回按钮 */
        .back-btn {
            padding: 10px 20px;
            background: #6B7280;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 25px;
            transition: 0.3s;
        }
        .back-btn:hover {
            background: #4B5563;
        }

        /* 登录/表单卡片 */
        .seller-login, .form-card {
            max-width: 480px;
            margin: 0 auto;
            padding: 35px;
            background: #FAF5FF;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.08);
        }
        .input-group {
            margin-bottom: 24px;
        }
        .input-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #4F46E5;
            font-size: 15px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #E5E7EB;
            border-radius: 12px;
            font-size: 16px;
            transition: 0.3s;
            outline: none;
        }
        .input-group input:focus {
            border-color: #7C3AED;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        /* 主按钮 */
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #7C3AED 0%, #8B5CF6 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.2);
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.3);
        }

        /* 商品网格布局 */
        .goods-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
            margin-top: 25px;
        }

        /* 商品卡片（核心高级感） */
        .goods-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.08);
            transition: all 0.3s ease;
            border: none;
        }
        .goods-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(124, 58, 237, 0.15);
        }
        .goods-card h3 {
            color: #1F2937;
            margin-bottom: 12px;
            font-size: 20px;
            font-weight: 700;
        }
        .price {
            color: #DC2626;
            font-size: 24px;
            font-weight: 800;
            margin: 15px 0;
        }
        .stock {
            color: #6B7280;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .sold-out {
            color: #EF4444;
            font-weight: 700;
            font-size: 14px;
            margin: 10px 0;
        }

        /* 卡片按钮 */
        .buy-btn, .edit-btn, .cart-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            margin-top: 8px;
            transition: 0.3s;
        }
        .cart-btn {
            background: linear-gradient(135deg, #A78BFA 0%, #7C3AED 100%);
        }
        .edit-btn {
            background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);
        }
        .buy-btn {
            background: linear-gradient(135deg, #EC4899 0%, #DB2777 100%);
        }
        .goods-card button:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        /* 购物车 & 订单样式 */
        .cart-item, .order-item {
            padding: 20px;
            background: #FAF5FF;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 4px solid #7C3AED;
        }
        .cart-item h4, .order-item p:first-child {
            color: #5B21B6;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .order-item p:last-child {
            color: #6B7280;
            font-size: 13px;
        }

        /* 支付按钮 */
        .pay-btn {
            padding: 18px 40px;
            background: linear-gradient(135deg, #7C3AED 0%, #6D28D9 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.25);
            margin-top: 25px;
        }
        .pay-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.35);
        }

        /* 提示文字 */
        .tip {
            color: #9CA3AF;
            margin: 15px 0;
            text-align: center;
            font-size: 13px;
        }

        /* 标题层级 */
        h2 {
            color: #5B21B6;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: 700;
        }
        h3 {
            color: #4F46E5;
            margin: 30px 0 15px;
            font-size: 20px;
            font-weight: 700;
        }

        /* 卖家统计 */
        .stats {
            background: #FAF5FF;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            font-size: 16px;
            color: #5B21B6;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="title">轻奢生鲜交易平台</h1>

    <!-- 首页：选择角色 -->
    <div id="homePage" class="page active">
        <div class="role-home">
            <button class="role-btn btn-buyer" onclick="goBuyer()">我是买家</button>
            <button class="role-btn btn-seller" onclick="goSellerLogin()">我是卖家</button>
        </div>
    </div>

    <!-- 卖家登录页 -->
    <div id="sellerLoginPage" class="page">
        <button class="back-btn" onclick="goHome()">返回首页</button>
        <div class="seller-login">
            <h2 style="text-align:center; margin-bottom:25px;">卖家登录</h2>
            <div class="input-group">
                <label>卖家用户名</label>
                <input id="sellerName" placeholder="输入您的专属用户名">
            </div>
            <button class="submit-btn" onclick="sellerLogin()">登录/注册</button>
            <p class="tip">无需密码，用户名即为您的身份标识</p>
        </div>
    </div>

    <!-- 卖家中心 -->
    <div id="sellerCenterPage" class="page">
        <button class="back-btn" onclick="goHome()">返回首页</button>
        <h2>卖家中心｜<span id="currentSeller" style="color:#7C3AED;"></span></h2>
        <div class="stats">
            总销量：<span id="totalSales" style="color:#DC2626; font-size:18px;">0</span> 件
        </div>
        
        <!-- 发布商品 -->
        <div class="form-card">
            <h3>发布 / 修改商品</h3>
            <div class="input-group">
                <label>商品名称</label>
                <input id="goodsName" placeholder="例如：精品剩菜套餐">
            </div>
            <div class="input-group">
                <label>商品价格（元）</label>
                <input id="goodsPrice" type="number" step="0.01" placeholder="0.00">
            </div>
            <div class="input-group">
                <label>库存数量</label>
                <input id="goodsStock" type="number" placeholder="0">
            </div>
            <button class="submit-btn" onclick="publishGoods()">发布商品</button>
        </div>

        <h3>我的商品</h3>
        <div class="goods-grid" id="sellerGoodsList"></div>

        <h3>我的订单</h3>
        <div id="sellerOrderList"></div>
    </div>

    <!-- 买家市场 -->
    <div id="buyerMarketPage" class="page">
        <button class="back-btn" onclick="goHome()">返回首页</button>
        <h2>买家商城</h2>
        <button class="cart-btn" onclick="goCart()" style="margin:15px 0; width:auto;">🛒 我的购物车</button>
        <div class="goods-grid" id="buyerGoodsList"></div>
    </div>

    <!-- 购物车 -->
    <div id="cartPage" class="page">
        <button class="back-btn" onclick="goBuyerMarket()">返回商城</button>
        <h2>购物车</h2>
        <div id="cartList"></div>
        <div style="margin-top:30px;">
            <h3>合计金额：<span id="totalMoney" style="color:#DC2626; font-size:26px;">0</span> 元</h3>
            <button class="pay-btn" onclick="mockPay()">✅ 模拟支付下单</button>
            <p class="tip">纯模拟支付，无真实资金交易</p>
        </div>
    </div>
</div>

<script>
// ===================== 全局数据（本地永久存储）=====================
let allGoods = JSON.parse(localStorage.getItem('allGoods')) || [];
let allOrders = JSON.parse(localStorage.getItem('allOrders')) || [];
let currentSeller = '';
let cart = JSON.parse(localStorage.getItem('cart')) || [];
let editGoodsIndex = null;

// ===================== 页面跳转 =====================
function goHome() {
    hideAllPages();
    document.getElementById('homePage').classList.add('active');
}
function goBuyer() {
    hideAllPages();
    document.getElementById('buyerMarketPage').classList.add('active');
    renderBuyerGoods();
}
function goSellerLogin() {
    hideAllPages();
    document.getElementById('sellerLoginPage').classList.add('active');
}
function goSellerCenter() {
    hideAllPages();
    document.getElementById('sellerCenterPage').classList.add('active');
    renderSellerData();
}
function goBuyerMarket() {
    hideAllPages();
    document.getElementById('buyerMarketPage').classList.add('active');
    renderBuyerGoods();
}
function goCart() {
    hideAllPages();
    document.getElementById('cartPage').classList.add('active');
    renderCart();
}
function hideAllPages() {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
}

// ===================== 卖家功能 =====================
function sellerLogin() {
    const name = document.getElementById('sellerName').value.trim();
    if (!name) { alert('请输入用户名'); return; }
    currentSeller = name;
    document.getElementById('currentSeller').innerText = name;
    goSellerCenter();
}

function publishGoods() {
    const name = document.getElementById('goodsName').value.trim();
    const price = parseFloat(document.getElementById('goodsPrice').value) || 0;
    const stock = parseInt(document.getElementById('goodsStock').value) || 0;

    if (!name || price <= 0 || stock < 0) { alert('请填写完整有效的信息'); return; }

    const goods = { seller: currentSeller, name, price, stock, sales: 0 };

    if (editGoodsIndex !== null) {
        allGoods[editGoodsIndex] = goods;
        editGoodsIndex = null;
    } else {
        allGoods.push(goods);
    }

    saveData();
    clearPublishForm();
    renderSellerData();
}

function editGoods(index) {
    const g = allGoods[index];
    document.getElementById('goodsName').value = g.name;
    document.getElementById('goodsPrice').value = g.price;
    document.getElementById('goodsStock').value = g.stock;
    editGoodsIndex = index;
}

function renderSellerData() {
    renderSellerGoods();
    renderSellerOrders();
    calcTotalSales();
}

// ===================== 买家功能 =====================
function addToCart(index) {
    const goods = allGoods[index];
    if (goods.stock <= 0) { alert('商品已售罄'); return; }
    
    const cartItem = { ...goods, buyNum: 1, goodsIndex: index };
    cart.push(cartItem);
    saveCart();
    alert('加入购物车成功！');
}

function renderCart() {
    const el = document.getElementById('cartList');
    let total = 0;
    el.innerHTML = '';

    cart.forEach((item, i) => {
        total += item.price * item.buyNum;
        el.innerHTML += `
            <div class="cart-item">
                <h4>${item.name}</h4>
                <p>单价：${item.price.toFixed(2)}元｜数量：${item.buyNum}</p>
                <p>卖家：${item.seller}</p>
            </div>
        `;
    });

    document.getElementById('totalMoney').innerText = total.toFixed(2);
}

function mockPay() {
    if (cart.length === 0) { alert('购物车为空'); return; }
    
    cart.forEach(item => {
        const goods = allGoods[item.goodsIndex];
        goods.stock -= item.buyNum;
        goods.sales += item.buyNum;
        
        allOrders.push({
            buyer: '游客',
            seller: goods.seller,
            goodsName: goods.name,
            buyNum: item.buyNum,
            money: (item.price * item.buyNum).toFixed(2),
            time: new Date().toLocaleString()
        });
    });

    saveData();
    cart = [];
    saveCart();
    alert('支付成功！订单已生成');
    goBuyerMarket();
}

// ===================== 数据存储 =====================
function saveData() {
    localStorage.setItem('allGoods', JSON.stringify(allGoods));
    localStorage.setItem('allOrders', JSON.stringify(allOrders));
}
function saveCart() {
    localStorage.setItem('cart', JSON.stringify(cart));
}
function clearPublishForm() {
    document.getElementById('goodsName').value = '';
    document.getElementById('goodsPrice').value = '';
    document.getElementById('goodsStock').value = '';
}

// ===================== 渲染工具 =====================
function renderBuyerGoods() {
    const el = document.getElementById('buyerGoodsList');
    el.innerHTML = '';
    allGoods.forEach((g, i) => {
        el.innerHTML += `
            <div class="goods-card">
                <h3>${g.name}</h3>
                <p>卖家：${g.seller}</p>
                <div class="price">¥${g.price.toFixed(2)}</div>
                <div class="stock">库存：${g.stock}</div>
                ${g.stock <= 0 ? '<p class="sold-out">❌ 已售罄</p>' : ''}
                <button class="cart-btn" onclick="addToCart(${i})">🛒 加入购物车</button>
            </div>
        `;
    });
}

function renderSellerGoods() {
    const el = document.getElementById('sellerGoodsList');
    el.innerHTML = '';
    allGoods.forEach((g, i) => {
        if (g.seller === currentSeller) {
            el.innerHTML += `
                <div class="goods-card">
                    <h3>${g.name}</h3>
                    <div class="price">¥${g.price.toFixed(2)}</div>
                    <div class="stock">库存：${g.stock}｜销量：${g.sales}</div>
                    ${g.stock <= 0 ? '<p class="sold-out">❌ 已售罄</p>' : ''}
                    <button class="edit-btn" onclick="editGoods(${i})">修改商品</button>
                </div>
            `;
        }
    });
}

function renderSellerOrders() {
    const el = document.getElementById('sellerOrderList');
    el.innerHTML = '';
    allOrders.forEach(o => {
        if (o.seller === currentSeller) {
            el.innerHTML += `
                <div class="order-item">
                    <p>商品：${o.goodsName}｜数量：${o.buyNum}｜金额：${o.money}元</p>
                    <p>下单时间：${o.time}</p>
                </div>
            `;
        }
    });
}

function calcTotalSales() {
    let total = 0;
    allGoods.forEach(g => { if (g.seller === currentSeller) total += g.sales; });
    document.getElementById('totalSales').innerText = total;
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生鲜剩菜交易平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f7f8fa;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
        }
        .title {
            text-align: center;
            color: #ff3c00;
            margin-bottom: 30px;
            font-size: 26px;
        }
        /* 角色首页 */
        .role-home {
            text-align: center;
            margin: 50px 0;
        }
        .role-btn {
            padding: 16px 40px;
            font-size: 18px;
            margin: 0 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            transition: 0.3s;
        }
        .btn-buyer { background: #ff6900; }
        .btn-seller { background: #0099ff; }
        .btn-buyer:hover, .btn-seller:hover { opacity: 0.9; }

        /* 页面通用 */
        .page { display: none; margin-top: 20px; }
        .page.active { display: block; }
        .back-btn {
            padding: 8px 16px;
            background: #666;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        /* 卖家登录 */
        .seller-login {
            max-width: 400px;
            margin: 0 auto;
            padding: 30px;
            border: 1px solid #eee;
            border-radius: 10px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #0099ff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        /* 商品网格 */
        .goods-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .goods-card {
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 15px;
            transition: 0.2s;
        }
        .goods-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .goods-card h3 {
            color: #333;
            margin-bottom: 8px;
            font-size: 18px;
        }
        .price {
            color: #ff3c00;
            font-size: 20px;
            font-weight: bold;
            margin: 10px 0;
        }
        .stock {
            color: #666;
            margin-bottom: 10px;
        }
        .sold-out {
            color: red;
            font-weight: bold;
        }
        .buy-btn, .edit-btn, .cart-btn {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            margin-top: 5px;
        }
        .buy-btn { background: #ff3c00; }
        .edit-btn { background: #ffa500; }
        .cart-btn { background: #0099ff; }

        /* 购物车 & 订单 */
        .cart-item, .order-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        .pay-btn {
            padding: 12px 30px;
            background: #ff3c00;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        .tip {
            color: #999;
            margin: 10px 0;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="title">生鲜剩菜交易平台</h1>

    <!-- 首页：选择角色 -->
    <div id="homePage" class="page active">
        <div class="role-home">
            <button class="role-btn btn-buyer" onclick="goBuyer()">我是买家</button>
            <button class="role-btn btn-seller" onclick="goSellerLogin()">我是卖家</button>
        </div>
    </div>

    <!-- 卖家登录页 -->
    <div id="sellerLoginPage" class="page">
        <button class="back-btn" onclick="goHome()">返回首页</button>
        <div class="seller-login">
            <h2 style="text-align:center; margin-bottom:20px;">卖家登录</h2>
            <div class="input-group">
                <label>卖家用户名</label>
                <input id="sellerName" placeholder="输入用户名（唯一标识）">
            </div>
            <button class="submit-btn" onclick="sellerLogin()">登录/注册</button>
            <p class="tip">无需密码，用户名即你的身份</p>
        </div>
    </div>

    <!-- 卖家中心 -->
    <div id="sellerCenterPage" class="page">
        <button class="back-btn" onclick="goHome()">返回首页</button>
        <h2>卖家中心 - <span id="currentSeller"></span></h2>
        <p style="margin:10px 0; color:#666;">总销量：<span id="totalSales" style="color:red; font-weight:bold;">0</span> 件</p>
        
        <!-- 发布商品 -->
        <div style="margin:20px 0; padding:20px; border:1px solid #eee; border-radius:8px;">
            <h3>发布/修改商品</h3>
            <div class="input-group">
                <label>商品名称</label>
                <input id="goodsName" placeholder="如：晚餐剩菜套餐">
            </div>
            <div class="input-group">
                <label>商品价格（元）</label>
                <input id="goodsPrice" type="number" step="0.01">
            </div>
            <div class="input-group">
                <label>库存数量</label>
                <input id="goodsStock" type="number">
            </div>
            <button class="submit-btn" onclick="publishGoods()">发布商品</button>
        </div>

        <!-- 我的商品 -->
        <h3>我的商品</h3>
        <div class="goods-grid" id="sellerGoodsList"></div>

        <!-- 我的订单 -->
        <h3 style="margin-top:30px;">我的订单</h3>
        <div id="sellerOrderList"></div>
    </div>

    <!-- 买家市场 -->
    <div id="buyerMarketPage" class="page">
        <button class="back-btn" onclick="goHome()">返回首页</button>
        <h2>买家市场</h2>
        <button class="cart-btn" onclick="goCart()" style="margin:15px 0;">🛒 查看购物车</button>
        <div class="goods-grid" id="buyerGoodsList"></div>
    </div>

    <!-- 购物车 -->
    <div id="cartPage" class="page">
        <button class="back-btn" onclick="goBuyerMarket()">返回市场</button>
        <h2>购物车</h2>
        <div id="cartList"></div>
        <div style="margin-top:20px;">
            <h3>总金额：<span id="totalMoney" style="color:red; font-size:22px;">0</span> 元</h3>
            <button class="pay-btn" onclick="mockPay()">模拟支付下单</button>
            <p class="tip">模拟支付，无需真实付款</p>
        </div>
    </div>
</div>

<script>
// ===================== 全局数据（本地永久存储）=====================
let allGoods = JSON.parse(localStorage.getItem('allGoods')) || [];
let allOrders = JSON.parse(localStorage.getItem('allOrders')) || [];
let currentSeller = '';
let cart = JSON.parse(localStorage.getItem('cart')) || [];
let editGoodsIndex = null;

// ===================== 页面跳转 =====================
function goHome() {
    hideAllPages();
    document.getElementById('homePage').classList.add('active');
}
function goBuyer() {
    hideAllPages();
    document.getElementById('buyerMarketPage').classList.add('active');
    renderBuyerGoods();
}
function goSellerLogin() {
    hideAllPages();
    document.getElementById('sellerLoginPage').classList.add('active');
}
function goSellerCenter() {
    hideAllPages();
    document.getElementById('sellerCenterPage').classList.add('active');
    renderSellerData();
}
function goBuyerMarket() {
    hideAllPages();
    document.getElementById('buyerMarketPage').classList.add('active');
    renderBuyerGoods();
}
function goCart() {
    hideAllPages();
    document.getElementById('cartPage').classList.add('active');
    renderCart();
}
function hideAllPages() {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
}

// ===================== 卖家功能 =====================
// 卖家登录
function sellerLogin() {
    const name = document.getElementById('sellerName').value.trim();
    if (!name) { alert('请输入用户名'); return; }
    currentSeller = name;
    document.getElementById('currentSeller').innerText = name;
    goSellerCenter();
}

// 发布/修改商品
function publishGoods() {
    const name = document.getElementById('goodsName').value.trim();
    const price = parseFloat(document.getElementById('goodsPrice').value) || 0;
    const stock = parseInt(document.getElementById('goodsStock').value) || 0;

    if (!name || price <= 0 || stock < 0) { alert('填写完整信息'); return; }

    const goods = { seller: currentSeller, name, price, stock, sales: 0 };

    if (editGoodsIndex !== null) {
        allGoods[editGoodsIndex] = goods;
        editGoodsIndex = null;
    } else {
        allGoods.push(goods);
    }

    saveData();
    clearPublishForm();
    renderSellerData();
}

// 编辑商品
function editGoods(index) {
    const g = allGoods[index];
    document.getElementById('goodsName').value = g.name;
    document.getElementById('goodsPrice').value = g.price;
    document.getElementById('goodsStock').value = g.stock;
    editGoodsIndex = index;
}

// 渲染卖家数据
function renderSellerData() {
    renderSellerGoods();
    renderSellerOrders();
    calcTotalSales();
}

// ===================== 买家功能 =====================
// 加入购物车
function addToCart(index) {
    const goods = allGoods[index];
    if (goods.stock <= 0) { alert('商品已售罄'); return; }
    
    const cartItem = { ...goods, buyNum: 1, goodsIndex: index };
    cart.push(cartItem);
    saveCart();
    alert('加入购物车成功！');
}

// 渲染购物车
function renderCart() {
    const el = document.getElementById('cartList');
    let total = 0;
    el.innerHTML = '';

    cart.forEach((item, i) => {
        total += item.price * item.buyNum;
        el.innerHTML += `
            <div class="cart-item">
                <h4>${item.name}</h4>
                <p>单价：${item.price.toFixed(2)}元 | 数量：${item.buyNum}</p>
                <p>卖家：${item.seller}</p>
            </div>
        `;
    });

    document.getElementById('totalMoney').innerText = total.toFixed(2);
}

// 模拟支付下单
function mockPay() {
    if (cart.length === 0) { alert('购物车为空'); return; }
    
    cart.forEach(item => {
        const goods = allGoods[item.goodsIndex];
        goods.stock -= item.buyNum;
        goods.sales += item.buyNum;
        
        allOrders.push({
            buyer: '游客',
            seller: goods.seller,
            goodsName: goods.name,
            buyNum: item.buyNum,
            money: (item.price * item.buyNum).toFixed(2),
            time: new Date().toLocaleString()
        });
    });

    saveData();
    cart = [];
    saveCart();
    alert('支付成功！订单已生成');
    goBuyerMarket();
}

// ===================== 数据存储（核心：永久保存）=====================
function saveData() {
    localStorage.setItem('allGoods', JSON.stringify(allGoods));
    localStorage.setItem('allOrders', JSON.stringify(allOrders));
}
function saveCart() {
    localStorage.setItem('cart', JSON.stringify(cart));
}
function clearPublishForm() {
    document.getElementById('goodsName').value = '';
    document.getElementById('goodsPrice').value = '';
    document.getElementById('goodsStock').value = '';
}

// ===================== 渲染工具 =====================
function renderBuyerGoods() {
    const el = document.getElementById('buyerGoodsList');
    el.innerHTML = '';
    allGoods.forEach((g, i) => {
        el.innerHTML += `
            <div class="goods-card">
                <h3>${g.name}</h3>
                <p>卖家：${g.seller}</p>
                <div class="price">¥${g.price.toFixed(2)}</div>
                <div class="stock">库存：${g.stock}</div>
                ${g.stock <= 0 ? '<p class="sold-out">已售罄</p>' : ''}
                <button class="cart-btn" onclick="addToCart(${i})">🛒 加入购物车</button>
            </div>
        `;
    });
}

function renderSellerGoods() {
    const el = document.getElementById('sellerGoodsList');
    el.innerHTML = '';
    allGoods.forEach((g, i) => {
        if (g.seller === currentSeller) {
            el.innerHTML += `
                <div class="goods-card">
                    <h3>${g.name}</h3>
                    <div class="price">¥${g.price.toFixed(2)}</div>
                    <div class="stock">库存：${g.stock} | 销量：${g.sales}</div>
                    ${g.stock <= 0 ? '<p class="sold-out">已售罄</p>' : ''}
                    <button class="edit-btn" onclick="editGoods(${i})">修改商品</button>
                </div>
            `;
        }
    });
}

function renderSellerOrders() {
    const el = document.getElementById('sellerOrderList');
    el.innerHTML = '';
    allOrders.forEach(o => {
        if (o.seller === currentSeller) {
            el.innerHTML += `
                <div class="order-item">
                    <p>商品：${o.goodsName} | 数量：${o.buyNum} | 金额：${o.money}元</p>
                    <p style="color:#666;">时间：${o.time}</p>
                </div>
            `;
        }
    });
}

function calcTotalSales() {
    let total = 0;
    allGoods.forEach(g => { if (g.seller === currentSeller) total += g.sales; });
    document.getElementById('totalSales').innerText = total;
}
</script>
</body>
</html>
